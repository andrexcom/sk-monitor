<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Skandia Monitor — Login</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body { background:#0a1628; color:white; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:24px; margin:0; }
    button { background:#3b82f6; color:white; border:none; padding:12px 32px; border-radius:8px; font-size:1em; cursor:pointer; }
  </style>
</head>
<body>
  <h1>🔐 Skandia Monitor</h1>
  <p style="color:#94a3b8">Acceso restringido</p>
  <button onclick="netlifyIdentity.open()">Iniciar sesión</button>
  <script>
    netlifyIdentity.on("login", function(user) {
      netlifyIdentity.close();
      window.location.href = "/";
    });
  </script>
</body>
</html>
